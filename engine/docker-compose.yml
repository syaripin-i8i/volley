services:
  volley-engine:
    build: .
    restart: unless-stopped
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=seat
      - DB_USERNAME=seat
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - seat-internal   # SeAT 内部ネットワーク（seat-web から http://volley-engine:8000 で到達可能）

networks:
  seat-internal:
    external: true
    name: seat-docker_seat-internal
